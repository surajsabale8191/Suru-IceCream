{% extends 'base.html' %}

{% block title %}Contact{% endblock title %}

{% block body %}
<div>
<h1 class="text-center">Contact Us
</div>
<div class="container">
<form method="POST" action=/contact>
{% csrf_token %}
  <div class="mb-3">
    <label for="name" class="form-label">Name</label>
    <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name"ria-describedby="emailHelp">
    
  <div class="mb-3">
    <label for="email" class="form-label">Email Address</label>
    <input type="text" class="form-control" id="email" name="email"placeholder="Enter your Email">
  </div>

   <div class="mb-3">
    <label for="phone" class="form-label">Phone Number</label>
    <input type="text" class="form-control" id="phone" name="phone"placeholder="Enter your Phone Number">
  </div>

  <div class="mb-3">
    <label for="desc" class="form-label">Tell me about what are you contact me</label>
    <textarea class="form-control" id="desc" name="desc" row="3" width="50" height="30"></textarea>
    
  </div>
  
  <button type="submit" class="btn btn-primary">Submit</button>
</form>

</div>    
{% endblock body %}
