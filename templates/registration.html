{% extends 'base.html' %}

{% block title %}Registration{% endblock title %}

{% block body %}

<div class="container"
     style="max-width:500px; margin-top:50px; padding:30px; border:1px solid #ddd; border-radius:15px; box-shadow:0px 4px 10px rgba(0,0,0,0.2); background-color:#fff;">

    <h2 class="text-center"
        style="margin-bottom:30px; color:#0d6efd; font-weight:bold;">
        Registration Form
    </h2>

    <form method="POST" action="/registration">
        {% csrf_token %}

        <div class="mb-3">
            <label for="name"
                   class="form-label"
                   style="font-weight:bold;">
                Name
            </label>

            <input type="text"
                   class="form-control"
                   id="name"
                   name="name"
                   placeholder="Enter your name"
                   style="height:45px; border-radius:8px;">
        </div>

        <div class="mb-3">
            <label for="email"
                   class="form-label"
                   style="font-weight:bold;">
                Email Address
            </label>

            <input type="email"
                   class="form-control"
                   id="email"
                   name="email"
                   placeholder="Enter your Email"
                   style="height:45px; border-radius:8px;">
        </div>

        <div class="mb-4">
            <label for="password"
                   class="form-label"
                   style="font-weight:bold;">
                Password
            </label>

            <input type="password"
                   class="form-control"
                   id="password"
                   name="password"
                   placeholder="Enter your password"
                   style="height:45px; border-radius:8px;">
        </div>

        <button type="submit"
                class="btn btn-primary w-100"
                style="height:45px; border-radius:8px; font-size:18px;">
            Register
        </button>

    </form>

</div>

{% endblock body %}
