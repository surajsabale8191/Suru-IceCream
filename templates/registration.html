{% block title %}Registration{% endblock title %}

{% block body %}

<div style="width:450px; margin:60px auto; background:#ffffff; padding:35px; border-radius:12px; box-shadow:0px 8px 20px rgba(0,0,0,0.15);">

    <h2 style="text-align:center; color:#0d6efd; margin-bottom:30px; font-weight:bold;">
        Registration Form
    </h2>

    <form method="POST" action="/registration">
        {% csrf_token %}

        <div style="margin-bottom:20px;">
            <label for="name"
                   style="font-weight:bold; display:block; margin-bottom:8px;">
                Full Name
            </label>

            <input type="text"
                   id="name"
                   name="name"
                   placeholder="Enter your full name"
                   required
                   style="width:100%; height:45px; padding:10px; border:1px solid #ccc; border-radius:8px; font-size:15px; outline:none;">
        </div>

        <div style="margin-bottom:20px;">
            <label for="email"
                   style="font-weight:bold; display:block; margin-bottom:8px;">
                Email Address
            </label>

            <input type="email"
                   id="email"
                   name="email"
                   placeholder="Enter your email"
                   required
                   style="width:100%; height:45px; padding:10px; border:1px solid #ccc; border-radius:8px; font-size:15px; outline:none;">
        </div>

        <div style="margin-bottom:25px;">
            <label for="password"
                   style="font-weight:bold; display:block; margin-bottom:8px;">
                Password
            </label>

            <input type="password"
                   id="password"
                   name="password"
                   placeholder="Enter your password"
                   required
                   style="width:100%; height:45px; padding:10px; border:1px solid #ccc; border-radius:8px; font-size:15px; outline:none;">
        </div>

        <button type="submit"
                style="width:100%; height:48px; background:#0d6efd; color:white; border:none; border-radius:8px; font-size:18px; font-weight:bold; cursor:pointer;">
            Register
        </button>

        <p style="text-align:center; margin-top:20px; font-size:15px;">
            Already have an account?
            <a href="{% url 'login' %}"
               style="color:#0d6efd; text-decoration:none; font-weight:bold;">
                Login
            </a>
        </p>

    </form>

</div>

{% endblock body %}
